name: Release Android APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag to build and update
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and upload APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected a semantic version tag such as v0.1.0, got: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check out release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run TypeScript checks
        run: npm run ts:check

      - name: Generate Android project
        working-directory: apps/mobile
        env:
          CI: 1
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p dist
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            "dist/aicliui-${RELEASE_TAG}-android.apk"
          sha256sum "dist/aicliui-${RELEASE_TAG}-android.apk" \
            > "dist/aicliui-${RELEASE_TAG}-android.apk.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aicliui-${{ env.RELEASE_TAG }}-android
          path: |
            dist/*.apk
            dist/*.sha256
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber
