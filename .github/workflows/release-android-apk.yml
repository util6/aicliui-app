name: Release Android APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag to build and update
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and upload APK
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
      AIONCORE_VERSION: v0.1.43
      NODE_VERSION: v22.22.0
      GEMINI_CLI_VERSION: 0.50.0
      ANDROID_NDK_VERSION: 27.1.12297006

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected a semantic version tag such as v0.1.0, got: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check out release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Check out AionCore source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: iOfficeAI/AionCore
          ref: ${{ env.AIONCORE_VERSION }}
          path: .runtime-src/aioncore

      - name: Check out Node.js source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: nodejs/node
          ref: ${{ env.NODE_VERSION }}
          path: .runtime-src/node

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android NDK
        run: sdkmanager "ndk;$ANDROID_NDK_VERSION"

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Cache Rust and Android Node builds
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .runtime-src/aioncore/target
            .runtime-src/node/out
          key: release-runtime-${{ runner.os }}-${{ env.AIONCORE_VERSION }}-${{ env.NODE_VERSION }}-${{ env.ANDROID_NDK_VERSION }}-${{ hashFiles('apps/mobile/patches/**', 'apps/mobile/scripts/build-*.sh') }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run TypeScript checks
        run: npm run ts:check

      - name: Cross-compile embedded AionCore
        run: >-
          ANDROID_NDK_ROOT="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"
          bash apps/mobile/scripts/build-embedded-runtime.sh .runtime-src/aioncore

      - name: Cross-compile embedded Node.js
        run: >-
          NODE_VERSION="$NODE_VERSION"
          ANDROID_NDK_ROOT="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"
          bash apps/mobile/scripts/build-android-node.sh .runtime-src/node

      - name: Package embedded agent resources
        run: bash apps/mobile/scripts/package-android-agents.sh

      - name: Generate Android project
        working-directory: apps/mobile
        env:
          CI: 1
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: apps/mobile/android
        run: >-
          ./gradlew assembleRelease
          --no-daemon
          -PreactNativeArchitectures=arm64-v8a
          -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

      - name: Verify embedded runtime APK
        shell: bash
        run: |
          APK="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          unzip -Z1 "$APK" | grep -Fxq 'lib/arm64-v8a/libaioncore.so'
          unzip -Z1 "$APK" | grep -Fxq 'lib/arm64-v8a/libnode.so'
          unzip -Z1 "$APK" | grep -Fxq 'assets/aicliui-runtime/node/lib/node_modules/npm/bin/npm-cli.js'
          unzip -Z1 "$APK" | grep -Fxq 'assets/aicliui-runtime.json'
          unzip -p "$APK" assets/aicliui-runtime.json > /tmp/aicliui-runtime.json
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('/tmp/aicliui-runtime.json', 'utf8'));
          const required = ['opencode', 'gemini', 'codex'];
          const agents = Array.isArray(manifest.agents) ? manifest.agents : [];
          const packagedPaths = [];
          for (const backend of required) {
            const agent = agents.find((entry) => entry?.backend === backend);
            if (!agent || typeof agent.launcher !== 'string' || !Array.isArray(agent.files)) {
              throw new Error(`Embedded runtime manifest is missing packaged ${backend} resources`);
            }
            if (!agent.files.includes(agent.launcher)) {
              throw new Error(`${backend} launcher is not included in its packaged file list`);
            }
            packagedPaths.push(...agent.files);
          }
          fs.writeFileSync('/tmp/aicliui-agent-paths', `${[...new Set(packagedPaths)].join('\n')}\n`);
          NODE
          while IFS= read -r packaged_path; do
            [[ -z "$packaged_path" ]] || unzip -Z1 "$APK" | grep -Fxq "$packaged_path"
          done < /tmp/aicliui-agent-paths
          "$ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer" manifest print "$APK" > /tmp/aicliui-manifest.xml
          grep -q 'app.aicliui.runtime.EmbeddedRuntimeService' /tmp/aicliui-manifest.xml
          if grep -qi 'com\.termux' /tmp/aicliui-manifest.xml; then
            echo "Release APK still contains a Termux permission, query, or component" >&2
            exit 1
          fi

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p dist
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            "dist/aicliui-${RELEASE_TAG}-android-arm64.apk"
          sha256sum "dist/aicliui-${RELEASE_TAG}-android-arm64.apk" \
            > "dist/aicliui-${RELEASE_TAG}-android-arm64.apk.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aicliui-${{ env.RELEASE_TAG }}-android
          path: |
            dist/*.apk
            dist/*.sha256
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber
